services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DB_PATH: /data/fund_transparency.db
      HMAC_KEY_PATH: /var/lib/fund_transparency/hmac.key
      CORS_ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      RUST_LOG: info
    volumes:
      - db_data:/data
      - key_data:/var/lib/fund_transparency
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/projects || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
  key_data:
